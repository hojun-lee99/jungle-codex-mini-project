services:
  - type: web
    name: what-should-i-web
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: FLASK_HOST
        value: "0.0.0.0"
      - key: USE_MOCK_ON_FAILURE
        value: "true"
      - key: DEFAULT_CITY
        value: "Seoul"
      - key: DEFAULT_REGION
        value: "KR"
